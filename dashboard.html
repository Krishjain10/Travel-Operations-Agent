<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseClose — Agent Command Center</title>
    <meta name="description" content="CaseClose: Autonomous AI agent for travel ticket resolution with ReAct reasoning">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           RESET & DESIGN TOKENS
           ═══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Surface system — deep layered dark */
            --bg-0: #07080d;
            --bg-1: #0c0e16;
            --bg-2: #12151f;
            --bg-3: #181c28;
            --bg-4: #1e2233;
            --bg-hover: #232840;

            /* Borders */
            --border-subtle: rgba(255,255,255,0.04);
            --border-default: rgba(255,255,255,0.07);
            --border-strong: rgba(255,255,255,0.12);
            --border-active: rgba(99,140,255,0.35);

            /* Text */
            --text-0: #f4f5f7;
            --text-1: #c8ccd6;
            --text-2: #8b90a0;
            --text-3: #555a6e;

            /* Accent palette */
            --blue: #638cff;
            --blue-dim: rgba(99,140,255,0.12);
            --cyan: #3dd8e0;
            --cyan-dim: rgba(61,216,224,0.10);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.10);
            --amber: #fbbf24;
            --amber-dim: rgba(251,191,36,0.10);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.10);
            --purple: #a78bfa;
            --purple-dim: rgba(167,139,250,0.10);
            --pink: #f472b6;

            /* Typography */
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;

            /* Radius */
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
            --r-xl: 20px;

            /* Transitions */
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html, body { height: 100%; }

        body {
            font-family: var(--sans);
            background: var(--bg-0);
            color: var(--text-0);
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ═══════════════════════════════════════
           LEFT RAIL
           ═══════════════════════════════════════ */
        .rail {
            width: 300px; min-width: 300px;
            height: 100vh;
            background: var(--bg-1);
            border-right: 1px solid var(--border-default);
            display: flex; flex-direction: column;
        }

        /* Brand */
        .brand {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; gap: 12px;
        }

        .brand-mark {
            width: 34px; height: 34px;
            border-radius: var(--r-md);
            background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 12px; color: #000; letter-spacing: -0.5px;
        }

        .brand h1 {
            font-size: 15px; font-weight: 800; letter-spacing: -0.4px;
        }

        .brand p {
            font-size: 10px; color: var(--text-3); font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 1px;
        }

        /* Metrics strip */
        .metrics {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 1px; background: var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .m-cell {
            background: var(--bg-1);
            padding: 12px 6px; text-align: center;
        }

        .m-cell .m-num {
            font-family: var(--mono);
            font-size: 18px; font-weight: 700; line-height: 1;
        }

        .m-cell .m-lbl {
            font-size: 8px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-3); margin-top: 4px;
        }

        .m-cell.c-green .m-num { color: var(--green); }
        .m-cell.c-red .m-num { color: var(--red); }
        .m-cell.c-blue .m-num { color: var(--blue); }
        .m-cell.c-amber .m-num { color: var(--amber); }

        /* Queue */
        .queue-head {
            padding: 14px 20px 10px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .queue-head span {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-3);
        }

        .pill-group { display: flex; gap: 2px; }

        .pill {
            padding: 3px 9px; font-size: 10px; font-weight: 600;
            border-radius: 20px; cursor: pointer;
            background: transparent; border: 1px solid var(--border-default);
            color: var(--text-2); font-family: var(--sans);
            transition: all 0.15s var(--ease);
        }

        .pill.on {
            background: var(--blue-dim);
            border-color: var(--border-active);
            color: var(--blue);
        }

        .pill:hover:not(.on) { border-color: var(--border-strong); color: var(--text-1); }

        .queue {
            flex: 1; overflow-y: auto;
            padding: 2px 8px 8px;
        }

        .q-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: var(--r-md);
            cursor: pointer; border: 1px solid transparent;
            transition: all 0.15s var(--ease); margin-bottom: 1px;
        }

        .q-item:hover { background: var(--bg-3); }

        .q-item.on {
            background: var(--blue-dim);
            border-color: var(--border-active);
        }

        .q-dot {
            width: 7px; height: 7px; border-radius: 50%;
            flex-shrink: 0;
        }

        .q-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
        .q-dot.esc { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.4); animation: blink 2.5s infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

        .q-info { flex: 1; min-width: 0; }

        .q-id {
            font-family: var(--mono);
            font-size: 10px; font-weight: 600; color: var(--text-3);
        }

        .q-title {
            font-size: 12px; font-weight: 600; margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-1);
        }

        .q-badge {
            font-size: 9px; font-weight: 700; padding: 2px 7px;
            border-radius: 20px; white-space: nowrap; letter-spacing: 0.3px;
        }

        .q-badge.voucher { background: var(--blue-dim); color: var(--blue); }
        .q-badge.refund { background: var(--green-dim); color: var(--green); }
        .q-badge.escalated { background: var(--red-dim); color: var(--red); }

        /* Memory */
        .memory {
            border-top: 1px solid var(--border-subtle);
            padding: 14px 16px 16px;
        }

        .memory h4 {
            font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--purple); margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .memory h4::before {
            content: ''; display: inline-block;
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--purple);
        }

        .mem-line {
            font-size: 11px; color: var(--text-2);
            padding: 2px 0; display: flex; gap: 6px; line-height: 1.4;
        }

        .mem-line span { flex-shrink: 0; font-size: 11px; }

        .mem-warn {
            margin-top: 8px; padding: 7px 10px;
            background: var(--amber-dim);
            border: 1px solid rgba(251,191,36,0.15);
            border-radius: var(--r-sm);
            font-size: 10px; color: var(--amber); line-height: 1.5;
        }

        /* ═══════════════════════════════════════
           MAIN PANEL
           ═══════════════════════════════════════ */
        .main {
            flex: 1; height: 100vh; overflow-y: auto;
            background: var(--bg-0);
        }

        .main-inner { padding: 28px 36px 60px; max-width: 960px; }

        /* Empty state */
        .empty {
            height: 70vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .empty-ring {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--border-default);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin-bottom: 20px;
            background: var(--bg-2);
        }

        .empty h2 { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
        .empty p { font-size: 13px; color: var(--text-3); max-width: 340px; line-height: 1.6; }

        /* ── Case Header ── */
        .case-head {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 24px;
            margin-bottom: 24px;
        }

        .case-head h2 {
            font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.25;
        }

        .ch-meta {
            margin-top: 6px;
            display: flex; flex-wrap: wrap; gap: 6px;
        }

        .ch-chip {
            font-size: 10px; font-weight: 600; padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-3); color: var(--text-2);
            font-family: var(--mono);
        }

        .decision-pill {
            padding: 7px 16px; border-radius: var(--r-md);
            font-size: 12px; font-weight: 700;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap; flex-shrink: 0;
        }

        .decision-pill.ok {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(52,211,153,0.2);
        }

        .decision-pill.esc {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.2);
        }

        /* ── Agent Telemetry ── */
        .tele {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 24px;
        }

        .tele-cell {
            background: var(--bg-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            padding: 14px; text-align: center;
        }

        .tele-cell .tc-val {
            font-family: var(--mono);
            font-size: 22px; font-weight: 800;
            color: var(--text-0);
        }

        .tele-cell .tc-lbl {
            font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-3); margin-top: 4px;
        }

        /* ── ReAct Pipeline ── */
        .react {
            display: flex; align-items: stretch;
            gap: 2px; margin-bottom: 28px;
        }

        .react-node {
            flex: 1;
            background: var(--bg-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            padding: 12px 8px; text-align: center;
            position: relative;
            transition: all 0.25s var(--ease);
        }

        .react-node::after {
            content: '';
            position: absolute; right: -9px; top: 50%;
            transform: translateY(-50%);
            width: 14px; height: 2px;
            background: var(--border-default);
        }

        .react-node:last-child::after { display: none; }

        .rn-icon { font-size: 18px; margin-bottom: 4px; }

        .rn-label {
            font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-3);
            transition: color 0.25s var(--ease);
        }

        .rn-sub {
            font-size: 9px; color: var(--text-3);
            margin-top: 2px; font-weight: 500;
        }

        /* Phase colors when active */
        .react-node.done { border-color: var(--border-strong); }
        .react-node.done.plan { border-color: rgba(251,191,36,0.25); background: var(--amber-dim); }
        .react-node.done.plan .rn-label { color: var(--amber); }
        .react-node.done.gather { border-color: rgba(99,140,255,0.25); background: var(--blue-dim); }
        .react-node.done.gather .rn-label { color: var(--blue); }
        .react-node.done.compute { border-color: rgba(61,216,224,0.25); background: var(--cyan-dim); }
        .react-node.done.compute .rn-label { color: var(--cyan); }
        .react-node.done.decide { border-color: rgba(167,139,250,0.25); background: var(--purple-dim); }
        .react-node.done.decide .rn-label { color: var(--purple); }
        .react-node.done.act-ok { border-color: rgba(52,211,153,0.25); background: var(--green-dim); }
        .react-node.done.act-ok .rn-label { color: var(--green); }
        .react-node.done.act-esc { border-color: rgba(248,113,113,0.25); background: var(--red-dim); }
        .react-node.done.act-esc .rn-label { color: var(--red); }

        /* ── Section Card ── */
        .card {
            background: var(--bg-1);
            border: 1px solid var(--border-default);
            border-radius: var(--r-lg);
            margin-bottom: 16px;
            overflow: hidden;
            animation: slideUp 0.35s var(--ease) both;
        }

        .card:nth-child(3) { animation-delay: 0.04s; }
        .card:nth-child(4) { animation-delay: 0.08s; }
        .card:nth-child(5) { animation-delay: 0.12s; }
        .card:nth-child(6) { animation-delay: 0.16s; }
        .card:nth-child(7) { animation-delay: 0.20s; }
        .card:nth-child(8) { animation-delay: 0.24s; }
        .card:nth-child(9) { animation-delay: 0.28s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-head {
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-head h3 {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-2);
            display: flex; align-items: center; gap: 8px;
        }

        .phase-tag {
            font-size: 8px; font-weight: 800; padding: 2px 7px;
            border-radius: 3px; letter-spacing: 0.5px;
        }

        .phase-tag.amber { background: var(--amber-dim); color: var(--amber); }
        .phase-tag.blue { background: var(--blue-dim); color: var(--blue); }
        .phase-tag.cyan { background: var(--cyan-dim); color: var(--cyan); }
        .phase-tag.purple { background: var(--purple-dim); color: var(--purple); }
        .phase-tag.green { background: var(--green-dim); color: var(--green); }
        .phase-tag.red { background: var(--red-dim); color: var(--red); }

        .card-head .ch-right {
            font-size: 10px; color: var(--text-3); font-weight: 500;
        }

        .card-body { padding: 16px 20px; }

        /* Plan content */
        .plan-text {
            font-size: 12px; line-height: 1.8;
            color: var(--text-1); white-space: pre-wrap;
            max-height: 200px; overflow-y: auto;
            padding-right: 8px;
        }

        /* Tool timeline */
        .tool-list { display: flex; flex-direction: column; }

        .tool-row {
            display: grid;
            grid-template-columns: 20px 1fr 1fr 50px;
            align-items: center; gap: 14px;
            padding: 9px 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 12px;
        }

        .tool-row:last-child { border-bottom: none; }

        .tool-dot {
            width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: 800;
        }

        .tool-dot.ok { background: var(--green-dim); color: var(--green); }
        .tool-dot.fail { background: var(--red-dim); color: var(--red); }

        .tool-name {
            font-family: var(--mono); font-weight: 600;
            font-size: 12px; color: var(--text-0);
        }

        .tool-result {
            font-size: 11px; color: var(--text-2);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .tool-iter {
            font-family: var(--mono); font-size: 10px;
            color: var(--text-3); text-align: right;
        }

        /* Refund grid */
        .refund-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .rf {
            background: var(--bg-2); border-radius: var(--r-md);
            padding: 14px; text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .rf .rf-lbl {
            font-size: 9px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-3); margin-bottom: 5px;
        }

        .rf .rf-val {
            font-family: var(--mono);
            font-size: 20px; font-weight: 800;
        }

        .rf-val.v-green { color: var(--green); }
        .rf-val.v-blue { color: var(--blue); }
        .rf-val.v-dim { color: var(--text-2); }

        /* Threshold gauge */
        .gauge {
            margin-top: 12px; padding: 10px 14px;
            background: var(--bg-2); border-radius: var(--r-md);
            border: 1px solid var(--border-subtle);
            display: flex; align-items: center; gap: 12px;
        }

        .gauge-lbl { font-size: 10px; color: var(--text-3); font-weight: 600; white-space: nowrap; }

        .gauge-track {
            flex: 1; height: 5px;
            background: var(--bg-4); border-radius: 3px; overflow: hidden;
        }

        .gauge-fill { height: 100%; border-radius: 3px; transition: width 0.6s var(--ease); }
        .gauge-fill.safe { background: var(--green); }
        .gauge-fill.warn { background: var(--amber); }
        .gauge-fill.danger { background: var(--red); }

        .gauge-val {
            font-family: var(--mono); font-size: 11px;
            font-weight: 600; color: var(--text-2); white-space: nowrap;
        }

        /* Reasoning box */
        .reason-text {
            font-size: 13px; line-height: 1.8;
            color: var(--text-1); padding: 2px 0 2px 16px;
            border-left: 2px solid var(--purple);
        }

        /* Guardrails */
        .gr-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .gr {
            background: var(--bg-2); border-radius: var(--r-md);
            padding: 14px; text-align: center;
            border: 1px solid var(--border-subtle);
        }

        .gr .gr-val {
            font-family: var(--mono);
            font-size: 16px; font-weight: 800;
            color: var(--text-0);
        }

        .gr .gr-lbl {
            font-size: 9px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-3); margin-top: 3px;
        }

        .gr .gr-tag {
            margin-top: 6px; display: inline-block;
            font-size: 8px; font-weight: 800;
            padding: 2px 7px; border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .gr-tag.ok { background: var(--green-dim); color: var(--green); }
        .gr-tag.warn { background: var(--amber-dim); color: var(--amber); }
        .gr-tag.danger { background: var(--red-dim); color: var(--red); }

        /* Quote box */
        .quote {
            font-size: 12px; line-height: 1.7;
            color: var(--text-2); padding: 12px 16px;
            background: var(--bg-2); border-radius: var(--r-md);
            border-left: 2px solid var(--text-3);
            max-height: 140px; overflow-y: auto;
        }

        .quote.italic { font-style: italic; border-left-color: var(--amber); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
    </style>
</head>
<body>

<!-- ════════════ LEFT RAIL ════════════ -->
<aside class="rail">
    <div class="brand">
        <div class="brand-mark">CC</div>
        <div>
            <h1>CaseClose</h1>
            <p>Autonomous Agent</p>
        </div>
    </div>

    <div class="metrics">
        <div class="m-cell c-green"><div class="m-num" id="mOk">—</div><div class="m-lbl">Resolved</div></div>
        <div class="m-cell c-red"><div class="m-num" id="mEsc">—</div><div class="m-lbl">Escalated</div></div>
        <div class="m-cell c-blue"><div class="m-num" id="mTok">—</div><div class="m-lbl">Tokens</div></div>
        <div class="m-cell c-amber"><div class="m-num" id="mSav">—</div><div class="m-lbl">Saved</div></div>
    </div>

    <div class="queue-head">
        <span>Case Queue</span>
        <div class="pill-group">
            <button class="pill on" onclick="filterQ('all',this)">All</button>
            <button class="pill" onclick="filterQ('resolved',this)">OK</button>
            <button class="pill" onclick="filterQ('escalated',this)">Esc</button>
        </div>
    </div>

    <div class="queue" id="queue"></div>

    <div class="memory">
        <h4>Agent Working Memory</h4>
        <div id="mem"></div>
    </div>
</aside>

<!-- ════════════ MAIN PANEL ════════════ -->
<main class="main" id="main">
    <div class="main-inner">
        <div class="empty">
            <div class="empty-ring">&#129302;</div>
            <h2>Select a case to inspect</h2>
            <p>Click a ticket in the queue to view the full agent reasoning trace, tool orchestration, and autonomous decision analysis.</p>
        </div>
    </div>
</main>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let CASES=[], TICKETS=[], active=null, filter='all';

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
async function boot(){
    try{
        const [cr,tr]=await Promise.all([fetch('/api/cases'),fetch('/api/tickets')]);
        CASES=await cr.json(); TICKETS=await tr.json();
        const tm={}; TICKETS.forEach(t=>tm[t.id]=t);
        CASES.forEach(c=>{const t=tm[c.ticket_id];if(t){c._sub=t.subject;c._body=t.body;c._ch=t.channel}});
        stats(); renderQ(); memory();
        if(CASES.length) pick(CASES[0].ticket_id);
    }catch(e){
        document.getElementById('queue').innerHTML=
            `<div style="padding:24px;color:var(--red);font-size:12px">API offline. Run <b>python server.py</b><br>${e.message}</div>`;
    }
}

// ═══════════════════════════════════════
// STATS
// ═══════════════════════════════════════
function stats(){
    const ok=CASES.filter(c=>c.decision&&c.decision.startsWith('RESOLVED')).length;
    const esc=CASES.filter(c=>c.decision==='ESCALATED').length;
    const tok=CASES.reduce((s,c)=>s+(c.total_tokens_used||0),0);
    let sav=0;
    CASES.forEach(c=>{
        if(c.decision==='RESOLVED_VOUCHER'&&c.refund_calculation){
            sav+=(c.refund_calculation.cost_to_business_cash||0)-(c.refund_calculation.cost_to_business_voucher||0);
        }
    });
    document.getElementById('mOk').textContent=String(ok).padStart(2,'0');
    document.getElementById('mEsc').textContent=String(esc).padStart(2,'0');
    document.getElementById('mTok').textContent=tok>1000?Math.round(tok/1000)+'K':tok||'—';
    document.getElementById('mSav').textContent=sav>0?'$'+Math.round(sav):'—';
}

// ═══════════════════════════════════════
// MEMORY
// ═══════════════════════════════════════
function memory(){
    const el=document.getElementById('mem');
    if(!CASES.length){el.innerHTML='<div class="mem-line"><span>—</span> No data</div>';return;}
    const air={};let cash=0,esc=0;
    CASES.forEach(c=>{
        if(c.refund_calculation)cash+=c.refund_calculation.cash_refund_amount||0;
        if(c.decision==='ESCALATED')esc++;
        const s=JSON.stringify(c.thought_trace||c.tools_called||[]);
        ['SkyWest Airlines','Pacific Air','Atlantic Airways'].forEach(a=>{if(s.includes(a))air[a]=(air[a]||0)+1});
    });
    const rate=Math.round(CASES.filter(c=>c.decision&&c.decision.startsWith('RESOLVED')).length/CASES.length*100);
    let h='';
    h+=`<div class="mem-line"><span>&#128230;</span> ${CASES.length} cases in context</div>`;
    h+=`<div class="mem-line"><span>&#128176;</span> $${Math.round(cash)} total refunds processed</div>`;
    h+=`<div class="mem-line"><span>&#129302;</span> ${rate}% autonomous resolution</div>`;
    Object.entries(air).forEach(([a,n])=>{if(n>=2)h+=`<div class="mem-warn">Pattern: ${n} issues with ${a}</div>`});
    if(esc>=2)h+=`<div class="mem-warn">${esc} escalations — review policies</div>`;
    el.innerHTML=h;
}

// ═══════════════════════════════════════
// QUEUE
// ═══════════════════════════════════════
function renderQ(){
    const el=document.getElementById('queue');
    let list=CASES;
    if(filter==='resolved')list=list.filter(c=>c.decision&&c.decision.startsWith('RESOLVED'));
    else if(filter==='escalated')list=list.filter(c=>c.decision==='ESCALATED');
    if(!list.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-3);font-size:12px">No cases</div>';return;}
    el.innerHTML=list.map(c=>{
        const d=c.decision||'';
        const isEsc=d==='ESCALATED';
        const isRef=d==='RESOLVED_REFUND';
        const dot=isEsc?'esc':'ok';
        const bc=isEsc?'escalated':isRef?'refund':'voucher';
        const bt=isEsc?'ESC':isRef?'REFUND':'VOUCHER';
        return `<div class="q-item ${active===c.ticket_id?'on':''}" onclick="pick('${c.ticket_id}')">
            <div class="q-dot ${dot}"></div>
            <div class="q-info"><div class="q-id">${c.ticket_id}</div><div class="q-title">${esc(c._sub||c.issue_type||c.ticket_id)}</div></div>
            <span class="q-badge ${bc}">${bt}</span>
        </div>`;
    }).join('');
}

function filterQ(f,btn){
    filter=f;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');
    renderQ();
}

// ═══════════════════════════════════════
// PICK → RENDER TRACE
// ═══════════════════════════════════════
function pick(id){
    active=id; renderQ();
    const c=CASES.find(x=>x.ticket_id===id);
    if(!c)return;

    const m=document.getElementById('main');
    const rc=c.refund_calculation||{};
    const isEsc=c.decision==='ESCALATED';
    const isRef=c.decision==='RESOLVED_REFUND';
    const tools=c.tools_called||[];
    const trace=c.thought_trace||[];

    const hasPlan=!!c.execution_plan;
    const gatherTools=['get_booking','get_policy','estimate_urgency','check_itinerary_conflict','search_alternate_flights'];
    const hasGather=tools.some(t=>gatherTools.includes(t.tool));
    const hasCompute=tools.some(t=>t.tool==='calculate_refund');
    const hasReason=!!c.reasoning;
    const hasAct=tools.some(t=>t.tool==='finalize_case');

    let h='<div class="main-inner">';

    // ── Header ──
    const dLabel=isEsc?'ESCALATED':isRef?'CASH REFUND':'VOUCHER';
    const dAmt=isEsc?`$${rc.cash_refund_amount||0} exceeds limit`:isRef?`$${rc.cash_refund_amount||0}`:`$${rc.voucher_equivalent_amount||0}`;
    h+=`<div class="case-head">
        <div>
            <h2>${esc(c._sub||c.issue_type||c.ticket_id)}</h2>
            <div class="ch-meta">
                <span class="ch-chip">${c.ticket_id}</span>
                <span class="ch-chip">${c.issue_type||'—'}</span>
                <span class="ch-chip">${c._ch||'—'}</span>
                <span class="ch-chip">${c.iterations_used||0} iter</span>
                <span class="ch-chip">${c.llm_calls||0} llm</span>
                <span class="ch-chip">${(c.total_tokens_used||0).toLocaleString()} tok</span>
                <span class="ch-chip">${c.elapsed_seconds||0}s</span>
            </div>
        </div>
        <div class="decision-pill ${isEsc?'esc':'ok'}">${isEsc?'&#128680;':'&#9989;'} ${dLabel} &mdash; ${dAmt}</div>
    </div>`;

    // ── Telemetry ──
    h+=`<div class="tele">
        <div class="tele-cell"><div class="tc-val">${c.iterations_used||0}</div><div class="tc-lbl">Iterations</div></div>
        <div class="tele-cell"><div class="tc-val">${c.llm_calls||0}</div><div class="tc-lbl">LLM Calls</div></div>
        <div class="tele-cell"><div class="tc-val">${(c.total_tokens_used||0).toLocaleString()}</div><div class="tc-lbl">Tokens</div></div>
        <div class="tele-cell"><div class="tc-val">${c.elapsed_seconds||0}s</div><div class="tc-lbl">Elapsed</div></div>
    </div>`;

    // ── ReAct Pipeline ──
    const actCls=isEsc?'act-esc':'act-ok';
    h+=`<div class="react">
        <div class="react-node plan ${hasPlan?'done':''}"><div class="rn-icon">&#128203;</div><div class="rn-label">Plan</div><div class="rn-sub">${hasPlan?'strategy':'—'}</div></div>
        <div class="react-node gather ${hasGather?'done':''}"><div class="rn-icon">&#128269;</div><div class="rn-label">Gather</div><div class="rn-sub">${tools.filter(t=>gatherTools.includes(t.tool)).length} tools</div></div>
        <div class="react-node compute ${hasCompute?'done':''}"><div class="rn-icon">&#129518;</div><div class="rn-label">Compute</div><div class="rn-sub">${hasCompute?'deterministic':'—'}</div></div>
        <div class="react-node decide ${hasReason?'done':''}"><div class="rn-icon">&#9878;&#65039;</div><div class="rn-label">Decide</div><div class="rn-sub">${hasReason?'tradeoff':'—'}</div></div>
        <div class="react-node ${actCls} ${hasAct||c.decision?'done':''}"><div class="rn-icon">${isEsc?'&#128680;':'&#9989;'}</div><div class="rn-label">Act</div><div class="rn-sub">${c.decision?(c.decision.replace('RESOLVED_','')).toLowerCase():'—'}</div></div>
    </div>`;

    // ── 1. Plan ──
    if(c.execution_plan){
        h+=`<div class="card"><div class="card-head"><h3><span class="phase-tag amber">PLAN</span> Agent Execution Strategy</h3><div class="ch-right">Iteration 0 &middot; Pre-execution</div></div>
        <div class="card-body"><div class="plan-text">${esc(c.execution_plan)}</div></div></div>`;
    }

    // ── 2. Tool Log ──
    if(tools.length){
        h+=`<div class="card"><div class="card-head"><h3><span class="phase-tag blue">GATHER</span> Tool Execution Log</h3><div class="ch-right">${tools.length} calls across ${c.iterations_used||'?'} iterations</div></div><div class="card-body"><div class="tool-list">`;
        tools.forEach(t=>{
            const ok=t.success!==false;
            const ts=trace.find(s=>s.tool===t.tool&&s.iteration===t.iteration&&s.type==='tool_result');
            const sum=ts?ts.result_summary:(t.args_summary||'');
            h+=`<div class="tool-row">
                <div class="tool-dot ${ok?'ok':'fail'}">${ok?'&#10003;':'&#10007;'}</div>
                <div class="tool-name">${esc(t.tool)}</div>
                <div class="tool-result" title="${esc(sum)}">${esc(sum)}</div>
                <div class="tool-iter">i${t.iteration}</div>
            </div>`;
        });
        h+=`</div></div></div>`;
    }

    // ── 3. Refund ──
    if(rc.cash_refund_amount!=null){
        const pct=rc.auto_approve_max>0?Math.min(100,Math.round(rc.cash_refund_amount/rc.auto_approve_max*100)):0;
        const fill=rc.exceeds_auto_approve?'danger':pct>70?'warn':'safe';
        h+=`<div class="card"><div class="card-head"><h3><span class="phase-tag cyan">COMPUTE</span> Deterministic Refund Calculation</h3><div class="ch-right">Pure Python &middot; No LLM</div></div>
        <div class="card-body">
            <div class="refund-grid">
                <div class="rf"><div class="rf-lbl">Cash Refund</div><div class="rf-val v-green">$${rc.cash_refund_amount}</div></div>
                <div class="rf"><div class="rf-lbl">Voucher Value</div><div class="rf-val v-blue">$${rc.voucher_equivalent_amount}</div></div>
                <div class="rf"><div class="rf-lbl">Biz Cost (Cash)</div><div class="rf-val v-dim">$${rc.cost_to_business_cash}</div></div>
                <div class="rf"><div class="rf-lbl">Biz Cost (Voucher)</div><div class="rf-val v-dim">$${rc.cost_to_business_voucher}</div></div>
            </div>
            <div class="gauge">
                <div class="gauge-lbl">Auto-Approve Threshold</div>
                <div class="gauge-track"><div class="gauge-fill ${fill}" style="width:${Math.min(pct,100)}%"></div></div>
                <div class="gauge-val">$${rc.cash_refund_amount} / $${rc.auto_approve_max}</div>
            </div>
        </div></div>`;
    }

    // ── 4. Reasoning ──
    if(c.reasoning){
        h+=`<div class="card"><div class="card-head"><h3><span class="phase-tag purple">DECIDE</span> AI Reasoning &mdash; Tradeoff Analysis</h3></div>
        <div class="card-body"><div class="reason-text">${esc(c.reasoning)}</div></div></div>`;
    }

    // ── 5. Guardrails ──
    const iPct=c.iterations_used?Math.round(c.iterations_used/6*100):0;
    const iSt=iPct>=100?'danger':iPct>66?'warn':'ok';
    const tSt=rc.exceeds_auto_approve?'danger':'ok';
    const co=c.self_corrections||0;
    const cSt=co>0?'warn':'ok';

    h+=`<div class="card"><div class="card-head"><h3><span class="phase-tag red">SAFETY</span> Guardrails &amp; Constraints</h3></div>
    <div class="card-body"><div class="gr-grid">
        <div class="gr"><div class="gr-val">${c.iterations_used||0} / 6</div><div class="gr-lbl">Iteration Cap</div><div class="gr-tag ${iSt}">${iPct>=100?'CAP HIT':'WITHIN LIMIT'}</div></div>
        <div class="gr"><div class="gr-val">$${rc.auto_approve_max||500}</div><div class="gr-lbl">Approve Limit</div><div class="gr-tag ${tSt}">${rc.exceeds_auto_approve?'EXCEEDED':'WITHIN LIMIT'}</div></div>
        <div class="gr"><div class="gr-val">${co}</div><div class="gr-lbl">Self-Corrections</div><div class="gr-tag ${cSt}">${co>0?co+' RECOVERY':'CLEAN RUN'}</div></div>
    </div></div></div>`;

    // ── 6. Customer ──
    if(c._body){
        h+=`<div class="card"><div class="card-head"><h3>Customer Input</h3></div>
        <div class="card-body"><div class="quote">${esc(c._body)}</div></div></div>`;
    }

    // ── 7. Policy ──
    if(c.policy_cited){
        h+=`<div class="card"><div class="card-head"><h3>Policy Cited</h3></div>
        <div class="card-body"><div class="quote italic">${esc(c.policy_cited)}</div></div></div>`;
    }

    h+='</div>';
    m.innerHTML=h;
    m.scrollTop=0;
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
boot();
</script>
</body>
</html>
