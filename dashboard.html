<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseClose — Agent Command Center</title>
    <meta name="description" content="CaseClose autonomous AI agent command center — real-time reasoning, tool orchestration, and decision visualization">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0b0f1a;
            --bg-surface: #111827;
            --bg-elevated: #1a2234;
            --bg-card: #1e293b;
            --bg-hover: #253348;
            --border: rgba(148, 163, 184, 0.1);
            --border-active: rgba(59, 130, 246, 0.4);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-dim: #475569;
            --accent-blue: #3b82f6;
            --accent-cyan: #22d3ee;
            --accent-green: #10b981;
            --accent-emerald: #34d399;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --glow-blue: 0 0 20px rgba(59, 130, 246, 0.15);
            --glow-green: 0 0 20px rgba(16, 185, 129, 0.15);
            --glow-amber: 0 0 20px rgba(245, 158, 11, 0.15);
            --glow-red: 0 0 20px rgba(239, 68, 68, 0.15);
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 10px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════
           LEFT PANEL — Case Queue + Memory
           ═══════════════════════════════════════ */
        .left-panel {
            width: 340px;
            min-width: 340px;
            height: 100vh;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800; color: #fff;
            box-shadow: var(--glow-blue);
        }

        .brand h1 {
            font-size: 17px; font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .brand span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 1px; }

        /* Agent Metrics Bar */
        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .metric {
            text-align: center;
            padding: 10px 4px;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .metric:hover { border-color: var(--border-active); }

        .metric .m-val {
            font-size: 20px; font-weight: 800;
            font-family: var(--mono);
            line-height: 1.1;
        }

        .metric .m-label {
            font-size: 9px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .metric.green .m-val { color: var(--accent-green); }
        .metric.blue .m-val { color: var(--accent-blue); }
        .metric.red .m-val { color: var(--accent-red); }
        .metric.purple .m-val { color: var(--accent-purple); }

        /* Case Queue */
        .queue-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .queue-header h2 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .queue-filters {
            display: flex; gap: 4px;
        }

        .q-filter {
            padding: 4px 10px; font-size: 11px; font-weight: 600;
            border-radius: 6px; cursor: pointer; border: none;
            background: transparent; color: var(--text-muted);
            font-family: var(--sans); transition: var(--transition);
        }

        .q-filter.active { background: var(--accent-blue); color: #fff; }
        .q-filter:hover:not(.active) { color: var(--text-primary); background: var(--bg-hover); }

        .case-queue {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }

        .case-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            margin-bottom: 2px;
        }

        .case-item:hover { background: var(--bg-hover); }

        .case-item.active {
            background: rgba(59, 130, 246, 0.08);
            border-color: var(--border-active);
        }

        .case-item .case-status {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .case-item .case-status.resolved { background: var(--accent-green); box-shadow: var(--glow-green); }
        .case-item .case-status.escalated { background: var(--accent-red); box-shadow: var(--glow-red); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .case-item .case-info { flex: 1; min-width: 0; }

        .case-item .case-id {
            font-family: var(--mono);
            font-size: 11px; font-weight: 600;
            color: var(--text-muted);
        }

        .case-item .case-title {
            font-size: 13px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }

        .case-item .case-badge {
            font-size: 10px; font-weight: 700; padding: 3px 8px;
            border-radius: 20px; white-space: nowrap;
        }

        .case-badge.voucher { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .case-badge.refund { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .case-badge.escalated { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        /* Memory Panel */
        .memory-panel {
            border-top: 1px solid var(--border);
            padding: 14px 16px;
            background: var(--bg-elevated);
        }

        .memory-panel h3 {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--accent-purple); margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .memory-item {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
            display: flex; align-items: center; gap: 8px;
            line-height: 1.4;
        }

        .memory-item .mem-icon { font-size: 12px; flex-shrink: 0; }

        .pattern-alert {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 6px;
            font-size: 11px;
            color: var(--accent-amber);
            line-height: 1.4;
        }

        /* ═══════════════════════════════════════
           MAIN PANEL — Agent Trace
           ═══════════════════════════════════════ */
        .main-panel {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .empty-state {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-dim); text-align: center;
        }

        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; max-width: 400px; line-height: 1.6; }

        /* Case Header */
        .case-header {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 20px;
        }

        .case-header .ch-left h2 {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
        }

        .case-header .ch-meta {
            font-size: 13px; color: var(--text-muted); margin-top: 4px;
            display: flex; align-items: center; gap: 12px;
        }

        .case-header .ch-meta .sep { color: var(--text-dim); }

        .decision-badge {
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }

        .decision-badge.resolved {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .decision-badge.escalated {
            background: rgba(239, 68, 68, 0.12);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }

        /* ReAct Pipeline */
        .react-pipeline {
            display: flex; align-items: center; gap: 0;
            background: var(--bg-surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 4px;
            overflow: hidden;
        }

        .react-phase {
            flex: 1; text-align: center;
            padding: 14px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .react-phase:not(:last-child)::after {
            content: '→';
            position: absolute; right: -8px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim); font-size: 14px;
            z-index: 1;
        }

        .react-phase .rp-icon { font-size: 18px; margin-bottom: 4px; }

        .react-phase .rp-label {
            font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .react-phase .rp-count {
            font-size: 11px; font-weight: 500;
            color: var(--text-dim); margin-top: 2px;
        }

        .react-phase.active { background: var(--bg-hover); }
        .react-phase.completed { opacity: 1; }
        .react-phase.plan.completed .rp-label { color: var(--accent-amber); }
        .react-phase.gather.completed .rp-label { color: var(--accent-blue); }
        .react-phase.compute.completed .rp-label { color: var(--accent-cyan); }
        .react-phase.decide.completed .rp-label { color: var(--accent-purple); }
        .react-phase.act.completed .rp-label { color: var(--accent-green); }

        /* Section Cards */
        .trace-section {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .trace-section .ts-header {
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .trace-section .ts-header:hover { background: var(--bg-hover); }

        .trace-section .ts-header h3 {
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            display: flex; align-items: center; gap: 8px;
        }

        .ts-header .ts-tag {
            font-size: 9px; font-weight: 700; padding: 2px 8px;
            border-radius: 4px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ts-tag.amber { background: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }
        .ts-tag.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .ts-tag.cyan { background: rgba(34, 211, 238, 0.15); color: var(--accent-cyan); }
        .ts-tag.purple { background: rgba(167, 139, 250, 0.15); color: var(--accent-purple); }
        .ts-tag.green { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .ts-tag.red { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        .ts-body { padding: 16px 20px; }

        /* Plan Box */
        .plan-content {
            font-size: 13px; line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            font-family: var(--sans);
        }

        /* Tool Execution Log */
        .tool-log { display: flex; flex-direction: column; gap: 0; }

        .tool-entry {
            display: grid;
            grid-template-columns: 24px 1fr 200px 60px 60px;
            align-items: center; gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            font-size: 13px;
        }

        .tool-entry:last-child { border-bottom: none; }

        .tool-entry .te-status {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }

        .tool-entry .te-status.ok { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .tool-entry .te-status.err { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        .tool-entry .te-name {
            font-family: var(--mono);
            font-weight: 600; font-size: 13px;
            color: var(--text-primary);
        }

        .tool-entry .te-result {
            font-size: 12px; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .tool-entry .te-iter {
            font-family: var(--mono); font-size: 11px;
            color: var(--text-dim); text-align: center;
        }

        .tool-entry .te-badge {
            font-size: 10px; font-weight: 600; text-align: right;
            color: var(--accent-green);
        }

        .tool-entry .te-badge.fail { color: var(--accent-red); }

        /* Reasoning Box */
        .reasoning-content {
            font-size: 14px; line-height: 1.8;
            color: var(--text-secondary);
            padding: 4px 0;
            position: relative;
            padding-left: 16px;
            border-left: 3px solid var(--accent-purple);
        }

        /* Refund Breakdown */
        .refund-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .refund-cell {
            padding: 14px; text-align: center;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .refund-cell .rc-label {
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); margin-bottom: 6px;
        }

        .refund-cell .rc-value {
            font-size: 22px; font-weight: 800;
            font-family: var(--mono);
        }

        .refund-cell .rc-value.green { color: var(--accent-green); }
        .refund-cell .rc-value.blue { color: var(--accent-blue); }
        .refund-cell .rc-value.dim { color: var(--text-muted); }

        .threshold-bar {
            margin-top: 12px; padding: 10px 14px;
            background: var(--bg-elevated);
            border-radius: 8px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }

        .threshold-bar .tb-label {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            white-space: nowrap;
        }

        .threshold-bar .tb-track {
            flex: 1; height: 6px; background: var(--bg-card);
            border-radius: 3px; overflow: hidden;
        }

        .threshold-bar .tb-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.5s ease;
        }

        .tb-fill.safe { background: var(--accent-green); }
        .tb-fill.warn { background: var(--accent-amber); }
        .tb-fill.danger { background: var(--accent-red); }

        .threshold-bar .tb-value {
            font-family: var(--mono); font-size: 12px;
            font-weight: 600; color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Guardrails */
        .guardrails-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .guardrail {
            padding: 14px; text-align: center;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .guardrail .gr-value {
            font-family: var(--mono);
            font-size: 18px; font-weight: 800;
        }

        .guardrail .gr-label {
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted); margin-top: 4px;
        }

        .guardrail .gr-status {
            font-size: 10px; font-weight: 600;
            margin-top: 6px; padding: 2px 8px;
            border-radius: 4px; display: inline-block;
        }

        .gr-status.ok { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .gr-status.warn { background: rgba(245, 158, 11, 0.1); color: var(--accent-amber); }
        .gr-status.danger { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); }

        /* Customer Message */
        .customer-msg {
            font-size: 13px; line-height: 1.7;
            color: var(--text-secondary);
            padding: 12px 16px;
            background: var(--bg-elevated);
            border-radius: 8px;
            border-left: 3px solid var(--text-dim);
        }

        /* Policy */
        .policy-text {
            font-size: 12px; line-height: 1.6;
            color: var(--text-muted);
            font-style: italic;
            padding: 10px 16px;
            background: var(--bg-elevated);
            border-radius: 8px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trace-section { animation: fadeIn 0.3s ease forwards; }
        .trace-section:nth-child(2) { animation-delay: 0.05s; }
        .trace-section:nth-child(3) { animation-delay: 0.1s; }
        .trace-section:nth-child(4) { animation-delay: 0.15s; }
        .trace-section:nth-child(5) { animation-delay: 0.2s; }
        .trace-section:nth-child(6) { animation-delay: 0.25s; }
        .trace-section:nth-child(7) { animation-delay: 0.3s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <!-- ═══ LEFT PANEL ═══ -->
    <aside class="left-panel">
        <div class="panel-header">
            <div class="brand">
                <div class="brand-icon">CC</div>
                <div>
                    <h1>CaseClose</h1>
                    <span>Autonomous Agent v1.1</span>
                </div>
            </div>
            <div class="metrics-bar">
                <div class="metric green"><div class="m-val" id="mResolved">—</div><div class="m-label">Resolved</div></div>
                <div class="metric red"><div class="m-val" id="mEscalated">—</div><div class="m-label">Escalated</div></div>
                <div class="metric blue"><div class="m-val" id="mTokens">—</div><div class="m-label">Tokens</div></div>
                <div class="metric purple"><div class="m-val" id="mSaved">—</div><div class="m-label">Saved</div></div>
            </div>
        </div>

        <div class="queue-header">
            <h2>Case Queue</h2>
            <div class="queue-filters">
                <button class="q-filter active" onclick="setFilter('all', this)">All</button>
                <button class="q-filter" onclick="setFilter('resolved', this)">OK</button>
                <button class="q-filter" onclick="setFilter('escalated', this)">Esc</button>
            </div>
        </div>

        <div class="case-queue" id="caseQueue">
            <div style="padding:40px 20px; text-align:center; color:var(--text-dim); font-size:13px;">Loading...</div>
        </div>

        <div class="memory-panel" id="memoryPanel">
            <h3>🧠 Agent Memory</h3>
            <div id="memoryContent">
                <div class="memory-item"><span class="mem-icon">📊</span> No cases processed yet</div>
            </div>
        </div>
    </aside>

    <!-- ═══ MAIN PANEL ═══ -->
    <main class="main-panel" id="mainPanel">
        <div class="empty-state">
            <div class="empty-icon">🤖</div>
            <h2>Select a case to inspect</h2>
            <p>Click any ticket in the queue to view the agent's full reasoning trace, tool execution log, and decision analysis.</p>
        </div>
    </main>

    <script>
    // ═══════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════
    let CASES = [];
    let TICKETS = [];
    let activeCase = null;
    let currentFilter = 'all';

    // ═══════════════════════════════════════
    // DATA LOADING
    // ═══════════════════════════════════════
    async function loadData() {
        try {
            const [casesRes, ticketsRes] = await Promise.all([
                fetch('/api/cases'),
                fetch('/api/tickets'),
            ]);
            CASES = await casesRes.json();
            TICKETS = await ticketsRes.json();

            const ticketMap = {};
            TICKETS.forEach(t => ticketMap[t.id] = t);
            CASES.forEach(c => {
                const t = ticketMap[c.ticket_id];
                if (t) { c._subject = t.subject; c._body = t.body; c._channel = t.channel; }
            });

            updateMetrics();
            renderQueue();
            updateMemory();

            // Auto-select first case
            if (CASES.length > 0) selectCase(CASES[0].ticket_id);
        } catch (err) {
            document.getElementById('caseQueue').innerHTML =
                `<div style="padding:20px; color:var(--accent-red); font-size:12px;">API error: ${err.message}<br><br>Run: python server.py</div>`;
        }
    }

    // ═══════════════════════════════════════
    // METRICS
    // ═══════════════════════════════════════
    function updateMetrics() {
        const resolved = CASES.filter(c => c.decision?.startsWith('RESOLVED')).length;
        const escalated = CASES.filter(c => c.decision === 'ESCALATED').length;
        const totalTokens = CASES.reduce((s, c) => s + (c.total_tokens_used || 0), 0);
        let saved = 0;
        CASES.forEach(c => {
            if (c.decision === 'RESOLVED_VOUCHER' && c.refund_calculation) {
                saved += (c.refund_calculation.cost_to_business_cash || 0) - (c.refund_calculation.cost_to_business_voucher || 0);
            }
        });

        document.getElementById('mResolved').textContent = String(resolved).padStart(2, '0');
        document.getElementById('mEscalated').textContent = String(escalated).padStart(2, '0');
        document.getElementById('mTokens').textContent = totalTokens > 1000 ? Math.round(totalTokens / 1000) + 'K' : totalTokens || '—';
        document.getElementById('mSaved').textContent = saved > 0 ? '$' + Math.round(saved) : '—';
    }

    // ═══════════════════════════════════════
    // MEMORY PANEL
    // ═══════════════════════════════════════
    function updateMemory() {
        const el = document.getElementById('memoryContent');
        if (CASES.length === 0) return;

        const airlines = {};
        let totalCash = 0;
        let escalations = 0;
        CASES.forEach(c => {
            const rc = c.refund_calculation;
            if (rc?.cash_refund_amount) totalCash += rc.cash_refund_amount;
            if (c.decision === 'ESCALATED') escalations++;
            // Extract airline from tools_called or thought_trace
            const trace = JSON.stringify(c.thought_trace || []);
            ['SkyWest Airlines', 'Pacific Air', 'Atlantic Airways'].forEach(a => {
                if (trace.includes(a)) airlines[a] = (airlines[a] || 0) + 1;
            });
        });

        let html = '';
        html += `<div class="memory-item"><span class="mem-icon">📦</span> ${CASES.length} cases in working memory</div>`;
        html += `<div class="memory-item"><span class="mem-icon">💰</span> $${Math.round(totalCash)} cumulative refunds processed</div>`;

        const autonomyRate = CASES.length > 0
            ? Math.round(CASES.filter(c => c.decision?.startsWith('RESOLVED')).length / CASES.length * 100) : 0;
        html += `<div class="memory-item"><span class="mem-icon">🤖</span> ${autonomyRate}% autonomous resolution rate</div>`;

        // Pattern alerts
        Object.entries(airlines).forEach(([airline, count]) => {
            if (count >= 2) {
                html += `<div class="pattern-alert">⚠️ Pattern: ${count} issues with ${airline} — possible systemic problem</div>`;
            }
        });

        if (escalations >= 2) {
            html += `<div class="pattern-alert">⚠️ ${escalations} escalations — high escalation rate may indicate policy gaps</div>`;
        }

        el.innerHTML = html;
    }

    // ═══════════════════════════════════════
    // CASE QUEUE
    // ═══════════════════════════════════════
    function renderQueue() {
        const el = document.getElementById('caseQueue');
        let filtered = CASES;

        if (currentFilter === 'resolved') filtered = filtered.filter(c => c.decision?.startsWith('RESOLVED'));
        else if (currentFilter === 'escalated') filtered = filtered.filter(c => c.decision === 'ESCALATED');

        if (filtered.length === 0) {
            el.innerHTML = '<div style="padding:30px; text-align:center; color:var(--text-dim); font-size:12px;">No matching cases.</div>';
            return;
        }

        el.innerHTML = filtered.map(c => {
            const d = c.decision || 'UNKNOWN';
            const isEsc = d === 'ESCALATED';
            const isRefund = d === 'RESOLVED_REFUND';
            const statusClass = isEsc ? 'escalated' : 'resolved';
            const badgeClass = isEsc ? 'escalated' : isRefund ? 'refund' : 'voucher';
            const badgeText = isEsc ? 'ESC' : isRefund ? 'REFUND' : 'VOUCHER';
            const isActive = activeCase === c.ticket_id;

            return `
                <div class="case-item ${isActive ? 'active' : ''}" onclick="selectCase('${c.ticket_id}')">
                    <div class="case-status ${statusClass}"></div>
                    <div class="case-info">
                        <div class="case-id">${c.ticket_id}</div>
                        <div class="case-title">${c._subject || c.issue_type || c.ticket_id}</div>
                    </div>
                    <span class="case-badge ${badgeClass}">${badgeText}</span>
                </div>
            `;
        }).join('');
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.q-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderQueue();
    }

    // ═══════════════════════════════════════
    // SELECT CASE — Render the full trace
    // ═══════════════════════════════════════
    function selectCase(ticketId) {
        activeCase = ticketId;
        renderQueue();
        const c = CASES.find(x => x.ticket_id === ticketId);
        if (!c) return;
        renderTrace(c);
    }

    function renderTrace(c) {
        const main = document.getElementById('mainPanel');
        const rc = c.refund_calculation || {};
        const isEsc = c.decision === 'ESCALATED';
        const isRefund = c.decision === 'RESOLVED_REFUND';
        const trace = c.thought_trace || [];
        const tools = c.tools_called || [];

        // Classify phases
        const hasPlan = !!c.execution_plan;
        const hasGather = tools.some(t => ['get_booking', 'get_policy', 'estimate_urgency', 'check_itinerary_conflict', 'search_alternate_flights'].includes(t.tool));
        const hasCompute = tools.some(t => t.tool === 'calculate_refund');
        const hasReason = !!c.reasoning;
        const hasAct = tools.some(t => t.tool === 'finalize_case');

        const decisionClass = isEsc ? 'escalated' : 'resolved';
        const decisionLabel = isEsc ? '🚨 ESCALATED' : isRefund ? '✅ REFUND' : '💳 VOUCHER';
        const decisionDetail = isEsc ? 'Requires Human Review' : isRefund
            ? `Cash $${rc.cash_refund_amount || 0}` : `Voucher $${rc.voucher_equivalent_amount || 0}`;

        let html = '';

        // ── Case Header ──
        html += `
            <div class="case-header">
                <div class="ch-left">
                    <h2>${c.ticket_id} — ${c._subject || c.issue_type}</h2>
                    <div class="ch-meta">
                        <span>${c.issue_type || '—'}</span>
                        <span class="sep">·</span>
                        <span>${c._channel || '—'}</span>
                        <span class="sep">·</span>
                        <span>${c.iterations_used || 0} iterations</span>
                        <span class="sep">·</span>
                        <span>${c.llm_calls || 0} LLM calls</span>
                        <span class="sep">·</span>
                        <span>${(c.total_tokens_used || 0).toLocaleString()} tokens</span>
                        <span class="sep">·</span>
                        <span>${c.elapsed_seconds || 0}s</span>
                    </div>
                </div>
                <div class="decision-badge ${decisionClass}">
                    ${decisionLabel}<span style="font-weight:400;font-size:12px;opacity:0.7;">— ${decisionDetail}</span>
                </div>
            </div>
        `;

        // ── ReAct Pipeline ──
        html += `
            <div class="react-pipeline">
                <div class="react-phase plan ${hasPlan ? 'completed' : ''}">
                    <div class="rp-icon">📋</div>
                    <div class="rp-label">Plan</div>
                    <div class="rp-count">${hasPlan ? '1 plan' : '—'}</div>
                </div>
                <div class="react-phase gather ${hasGather ? 'completed' : ''}">
                    <div class="rp-icon">🔍</div>
                    <div class="rp-label">Gather</div>
                    <div class="rp-count">${tools.filter(t => ['get_booking','get_policy','estimate_urgency','check_itinerary_conflict','search_alternate_flights'].includes(t.tool)).length} tools</div>
                </div>
                <div class="react-phase compute ${hasCompute ? 'completed' : ''}">
                    <div class="rp-icon">🧮</div>
                    <div class="rp-label">Compute</div>
                    <div class="rp-count">${hasCompute ? 'deterministic' : '—'}</div>
                </div>
                <div class="react-phase decide ${hasReason ? 'completed' : ''}">
                    <div class="rp-icon">⚖️</div>
                    <div class="rp-label">Decide</div>
                    <div class="rp-count">${hasReason ? 'tradeoff' : '—'}</div>
                </div>
                <div class="react-phase act ${hasAct ? 'completed' : ''}">
                    <div class="rp-icon">${isEsc ? '🚨' : '✅'}</div>
                    <div class="rp-label">Act</div>
                    <div class="rp-count">${c.decision ? c.decision.replace('RESOLVED_', '').toLowerCase() : '—'}</div>
                </div>
            </div>
        `;

        // ── 1. Execution Plan ──
        if (c.execution_plan) {
            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3><span class="ts-tag amber">Plan</span> Agent Execution Plan</h3><span style="font-size:11px;color:var(--text-dim);">Iter 0 · Pre-execution</span></div>
                    <div class="ts-body"><div class="plan-content">${escHtml(c.execution_plan)}</div></div>
                </div>
            `;
        }

        // ── 2. Tool Execution Log ──
        if (tools.length > 0) {
            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3><span class="ts-tag blue">Gather + Compute</span> Tool Execution Log</h3><span style="font-size:11px;color:var(--text-dim);">${tools.length} calls</span></div>
                    <div class="ts-body"><div class="tool-log">
            `;

            tools.forEach(t => {
                const statusClass = t.success !== false ? 'ok' : 'err';
                const statusIcon = t.success !== false ? '✓' : '✗';
                const badgeClass = t.success !== false ? '' : 'fail';

                // Get result summary from thought_trace
                const traceStep = trace.find(s => s.tool === t.tool && s.iteration === t.iteration && s.type === 'tool_result');
                const summary = traceStep?.result_summary || t.args_summary || '';

                html += `
                    <div class="tool-entry">
                        <div class="te-status ${statusClass}">${statusIcon}</div>
                        <div class="te-name">${t.tool}</div>
                        <div class="te-result" title="${escAttr(summary)}">${escHtml(summary)}</div>
                        <div class="te-iter">iter ${t.iteration}</div>
                        <div class="te-badge ${badgeClass}">${t.success !== false ? 'OK' : 'FAIL'}</div>
                    </div>
                `;
            });

            html += `</div></div></div>`;
        }

        // ── 3. Refund Calculation (Deterministic) ──
        if (rc.cash_refund_amount !== undefined) {
            const pct = rc.auto_approve_max > 0 ? Math.min(100, Math.round(rc.cash_refund_amount / rc.auto_approve_max * 100)) : 0;
            const fillClass = pct > 100 ? 'danger' : pct > 80 ? 'warn' : 'safe';

            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3><span class="ts-tag cyan">Compute</span> Deterministic Refund Calculation</h3><span style="font-size:11px;color:var(--text-dim);">No LLM</span></div>
                    <div class="ts-body">
                        <div class="refund-grid">
                            <div class="refund-cell"><div class="rc-label">Cash Refund</div><div class="rc-value green">$${rc.cash_refund_amount}</div></div>
                            <div class="refund-cell"><div class="rc-label">Voucher Value</div><div class="rc-value blue">$${rc.voucher_equivalent_amount}</div></div>
                            <div class="refund-cell"><div class="rc-label">Biz Cost (Cash)</div><div class="rc-value dim">$${rc.cost_to_business_cash}</div></div>
                            <div class="refund-cell"><div class="rc-label">Biz Cost (Voucher)</div><div class="rc-value dim">$${rc.cost_to_business_voucher}</div></div>
                        </div>
                        <div class="threshold-bar">
                            <div class="tb-label">Auto-Approve Threshold</div>
                            <div class="tb-track"><div class="tb-fill ${fillClass}" style="width:${Math.min(pct, 100)}%"></div></div>
                            <div class="tb-value">$${rc.cash_refund_amount} / $${rc.auto_approve_max}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ── 4. AI Reasoning ──
        if (c.reasoning) {
            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3><span class="ts-tag purple">Decide</span> AI Reasoning — Tradeoff Analysis</h3></div>
                    <div class="ts-body"><div class="reasoning-content">${escHtml(c.reasoning)}</div></div>
                </div>
            `;
        }

        // ── 5. Guardrails ──
        const iterPct = c.iterations_used && 6 ? Math.round(c.iterations_used / 6 * 100) : 0;
        const iterStatus = iterPct >= 100 ? 'danger' : iterPct > 66 ? 'warn' : 'ok';
        const thresholdStatus = rc.exceeds_auto_approve ? 'danger' : 'ok';
        const corrections = c.self_corrections || 0;
        const corrStatus = corrections > 0 ? 'warn' : 'ok';

        html += `
            <div class="trace-section">
                <div class="ts-header"><h3><span class="ts-tag red">Safety</span> Guardrails & Constraints</h3></div>
                <div class="ts-body">
                    <div class="guardrails-grid">
                        <div class="guardrail">
                            <div class="gr-value">${c.iterations_used || 0} / 6</div>
                            <div class="gr-label">Iteration Cap</div>
                            <div class="gr-status ${iterStatus}">${iterPct >= 100 ? 'CAP REACHED' : 'Within Limit'}</div>
                        </div>
                        <div class="guardrail">
                            <div class="gr-value">$${rc.auto_approve_max || 500}</div>
                            <div class="gr-label">Auto-Approve Max</div>
                            <div class="gr-status ${thresholdStatus}">${rc.exceeds_auto_approve ? 'EXCEEDED' : 'Within Limit'}</div>
                        </div>
                        <div class="guardrail">
                            <div class="gr-value">${corrections}</div>
                            <div class="gr-label">Self-Corrections</div>
                            <div class="gr-status ${corrStatus}">${corrections > 0 ? corrections + ' Recovery' : 'No Errors'}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // ── 6. Customer Message ──
        if (c._body) {
            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3>Customer Input</h3></div>
                    <div class="ts-body"><div class="customer-msg">${escHtml(c._body)}</div></div>
                </div>
            `;
        }

        // ── 7. Policy Cited ──
        if (c.policy_cited) {
            html += `
                <div class="trace-section">
                    <div class="ts-header"><h3>Policy Cited</h3></div>
                    <div class="ts-body"><div class="policy-text">${escHtml(c.policy_cited)}</div></div>
                </div>
            `;
        }

        main.innerHTML = html;
    }

    // ═══════════════════════════════════════
    // UTILS
    // ═══════════════════════════════════════
    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) { return escHtml(s); }

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    loadData();
    </script>
</body>
</html>
